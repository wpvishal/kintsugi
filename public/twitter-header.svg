<svg width="1500" height="500" viewBox="0 0 1500 500" xsi:schemaLocation="http://www.w3.org/2000/svg" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="noise">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
        <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#121212" />
  <rect width="100%" height="100%" filter="url(#noise)" opacity="0.05" />

  <!-- Kintsugi Crack (Gold) -->
  <path d="M-10,250 Q300,200 600,280 T1510,220" stroke="url(#goldGradient)" stroke-width="2" fill="none" filter="url(#glow)" stroke-linecap="round" />
  <path d="M-10,250 Q300,200 600,280 T1510,220" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.5" />

  <!-- Text -->
  <text x="50%" y="52%" dominant-baseline="middle" text-anchor="middle" font-family="'Shippori Mincho', 'Times New Roman', serif" font-weight="bold" font-size="64" letter-spacing="12" fill="#D4AF37" filter="url(#glow)">
    KINTSUGI PROTOCOL
  </text>
  
  <!-- Subtitle -->
   <text x="50%" y="65%" dominant-baseline="middle" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="300" font-size="24" letter-spacing="6" fill="#888888">
    REBIRTH OF THE BROKEN
  </text>

</svg>
