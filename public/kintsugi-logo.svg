<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#121212" />
  
  <!-- Circle Container -->
  <circle cx="250" cy="250" r="200" stroke="url(#goldGradient)" stroke-width="2" fill="none" class="animate-pulse" />
  
  <!-- Kintsugi Crack -->
  <path d="M100,200 Q250,250 400,300" stroke="#D4AF37" stroke-width="3" fill="none" filter="url(#glow)" />
  
  <!-- Kanji 'Gold' -->
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="'Shippori Mincho', serif" font-weight="bold" font-size="240" fill="#D4AF37" filter="url(#glow)">
    金
  </text>

</svg>
